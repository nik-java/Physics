<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arteriosklerose – realistisch</title>
<style>
body { margin:0; background:#111; }
canvas { display:block; margin:auto; background:#111; }
</style>
</head>
<body>

<canvas id="c" width="1100" height="420"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let time = 0;
let particles = [];

// Plaque-Formen (zeigen INS Gefäß)
const plaqueTop = {cx:550, cy:175, rx:100, ry:40};   // oben
const plaqueBottom = {cx:550, cy:265, rx:100, ry:40}; // unten

// ---------------- PARTICLES ----------------
function initParticles() {
    for (let i = 0; i < 160; i++) {
        particles.push({x:50+Math.random()*250, y:180+Math.random()*70, zone:"left"});
        particles.push({x:425+Math.random()*250, y:180+Math.random()*70, zone:"middle"});
        particles.push({x:800+Math.random()*250, y:180+Math.random()*70, zone:"right"});
    }
}
initParticles();

// ---------------- TUBE ----------------
function drawTube(x) {
    let grad = ctx.createLinearGradient(x,0,x+250,0);
    grad.addColorStop(0,"#7a0000");
    grad.addColorStop(0.5,"#ff2a2a");
    grad.addColorStop(1,"#5a0000");

    ctx.fillStyle = grad;
    ctx.fillRect(x,160,250,120);

    let inner = ctx.createLinearGradient(0,160,0,280);
    inner.addColorStop(0,"#2b0000");
    inner.addColorStop(0.5,"#550000");
    inner.addColorStop(1,"#2b0000");

    ctx.fillStyle = inner;
    ctx.fillRect(x,175,250,90);
}

// ---------------- PLAQUE ----------------
function drawPlaque() {
    ctx.fillStyle = "#d4a373";

    // oben: runde Seite nach unten (ins Gefäß)
    ctx.beginPath();
    ctx.ellipse(plaqueTop.cx, plaqueTop.cy, plaqueTop.rx, plaqueTop.ry, 0, 0, Math.PI);
    ctx.fill();

    // unten: runde Seite nach oben (ins Gefäß)
    ctx.beginPath();
    ctx.ellipse(plaqueBottom.cx, plaqueBottom.cy, plaqueBottom.rx, plaqueBottom.ry, 0, Math.PI, 2*Math.PI);
    ctx.fill();
}

// ---------------- BLOCK ----------------
function drawBlock() {
    ctx.fillStyle = "#3b0000";
    ctx.fillRect(920,175,20,90);
}

// ---------------- RBC ----------------
function drawRBC(x,y) {
    let g = ctx.createRadialGradient(x,y,1,x,y,6);
    g.addColorStop(0,"#ff6666");
    g.addColorStop(1,"#990000");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(x,y,6,4,0,0,Math.PI*2);
    ctx.fill();
}

// ---------------- FLOW LOGIK ----------------
function flowAround(p, plaque, direction) {

    let dx = (p.x - plaque.cx) / plaque.rx;
    let dy = (p.y - plaque.cy) / plaque.ry;
    let dist = dx*dx + dy*dy;

    // wenn nahe an Plaque → weich umlenken
    if (dist < 1.2 && p.x > 450 && p.x < 650) {

        if (direction === "down") {
            p.y += (1 - dist) * 3; // sanft nach unten drücken
        } else {
            p.y -= (1 - dist) * 3; // sanft nach oben drücken
        }
    }
}

// ---------------- UPDATE ----------------
function updateParticles() {
    let pulse = Math.sin(time)*0.3 + 1;

    particles.forEach(p => {

        if (p.zone === "left") {
            p.x += 1.6 * pulse;
            if (p.x > 300) p.x = 50;
        }

        if (p.zone === "middle") {
            p.x += 1.0 * pulse;

            // 👉 sanftes Umströmen (kein Springen!)
            flowAround(p, plaqueTop, "down");
            flowAround(p, plaqueBottom, "up");

            // Turbulenz
            if (p.x > 450 && p.x < 650) {
                p.y += (Math.random()-0.5)*0.8;
            }

            // Begrenzung Gefäß
            if (p.y < 175) p.y = 175;
            if (p.y > 265) p.y = 265;

            if (p.x > 700) p.x = 425;
        }

        if (p.zone === "right") {
            p.x += 0.2;

            if (p.x > 920) {
                p.x = 890 + Math.random()*15;
                p.y = 175 + Math.random()*90;
            }
        }
    });
}

// ---------------- DRAW ----------------
function draw() {
    ctx.clearRect(0,0,c.width,c.height);

    drawTube(50);
    drawTube(425);
    drawTube(800);

    drawPlaque();
    drawBlock();

    particles.forEach(p => drawRBC(p.x,p.y));

    ctx.fillStyle="white";
    ctx.font="18px Arial";
    ctx.fillText("Gesund", 120,130);
    ctx.fillText("Arteriosklerose", 460,130);
    ctx.fillText("Herzinfarkt", 830,130);
}

// ---------------- LOOP ----------------
function animate() {
    time += 0.05;
    updateParticles();
    draw();
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
